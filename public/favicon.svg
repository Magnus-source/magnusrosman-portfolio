<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- Clapperboard body -->
  <rect x="8" y="30" width="84" height="58" rx="4" fill="#ffffff"/>
  <!-- Body stripes -->
  <rect x="8" y="30" width="84" height="14" fill="#111111"/>
  <!-- Top clapper (angled) -->
  <polygon points="8,10 92,10 92,30 8,30" fill="#ffffff"/>
  <!-- Clapper diagonal stripes -->
  <clipPath id="clip">
    <polygon points="8,10 92,10 92,30 8,30"/>
  </clipPath>
  <g clip-path="url(#clip)">
    <rect x="8" y="8" width="14" height="24" fill="#111111" transform="skewX(-20)"/>
    <rect x="36" y="8" width="14" height="24" fill="#111111" transform="skewX(-20)"/>
    <rect x="64" y="8" width="14" height="24" fill="#111111" transform="skewX(-20)"/>
  </g>
  <!-- Hinge line -->
  <line x1="8" y1="30" x2="92" y2="30" stroke="#111111" stroke-width="2.5"/>
  <!-- Body lines -->
  <line x1="8" y1="54" x2="92" y2="54" stroke="#cccccc" stroke-width="1.5"/>
  <line x1="8" y1="70" x2="92" y2="70" stroke="#cccccc" stroke-width="1.5"/>
</svg>
